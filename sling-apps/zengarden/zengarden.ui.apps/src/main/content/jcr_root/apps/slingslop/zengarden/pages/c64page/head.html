<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!--//

  Because of sling:resourceSuperType="slingslop/zengarden/pages/basepage"
  in apge slingslop/zengarden/pages/c64page it is enough to just overlay the head.
  Force C64 theme 405 into the sling-model
//-->
<title>${properties.jcr:title}</title>
<link rel="stylesheet" data-sly-use.cssPicker="${'org.motorbrot.slingslop.zengarden.slingmodels.CssZenGarden' @ design_id='405'}"
      href="${cssPicker.randomCssUrl}" />

<!--/*  /zengarden/home.html?minLibs=no for unminified sources */-->
<sly data-sly-test.noMinLibs="${request.parameterMap['minLibs'][0] == 'no'}">

  <!-- Public bundle (unminified) -->
  <script src="/apps/slingslop/zengarden/js/public/public-bundle.js"></script>
  <link rel="stylesheet" href="/apps/slingslop/zengarden/css/public/public.css" />

  <!-- Editor bundle (unminified) — only for logged-in users -->
  <sly data-sly-use.auth="org.motorbrot.slingslop.zengarden.slingmodels.UserIsLoggedIn"
       data-sly-test="${auth.loggedIn}">
    <!-- htmx for hypermedia interactions -->
    <script src="/apps/slingslop/zengarden/js/htmx.js"></script>
    <script src="/apps/slingslop/zengarden/js/editor/editor-bundle.js"></script>
    <link rel="stylesheet" href="/apps/slingslop/zengarden/css/editor/editor.css" />
  </sly>

</sly>
<sly data-sly-test="${!noMinLibs}">

  <!-- Public bundle (minified) -->
  <script src="/apps/slingslop/zengarden/js/public/public-bundle.min.js"></script>
  <link rel="stylesheet" href="/apps/slingslop/zengarden/css/public/public.min.css" />

  <!-- Editor bundle (minified, htmx inlined) — only for logged-in users -->
  <sly data-sly-use.auth="org.motorbrot.slingslop.zengarden.slingmodels.UserIsLoggedIn"
       data-sly-test="${auth.loggedIn}">
    <script src="/apps/slingslop/zengarden/js/editor/editor-bundle.min.js"></script>
    <link rel="stylesheet" href="/apps/slingslop/zengarden/css/editor/editor.min.css" />
  </sly>

</sly>
