<div class="edit-fields-list">
	<div class="edit-fields-group">
		<div class="edit-fields-grid">
			<label class="edit-field-row">
				<span class="edit-field-meta">
					<span class="edit-field-label">Title</span>
					<small class="edit-field-description">Main heading (h1) shown in the banner.</small>
				</span>
				<input type="text" name="title" value="${properties.title}"
					class="edit-field-input" placeholder="Title" form="editor-form" />
			</label>
			<label class="edit-field-row">
				<span class="edit-field-meta">
					<span class="edit-field-label">Subtitle</span>
					<small class="edit-field-description">Secondary heading (h2) below the title.</small>
				</span>
				<input type="text" name="subtitle" value="${properties.subtitle}"
					class="edit-field-input" placeholder="Subtitle" form="editor-form" />
			</label>
		</div>
	</div>
</div>
