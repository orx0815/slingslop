<!--/*
Modal-only edit-form template (no inline richtext / no Tiptap markup).
Use this via sling:resourceSuperType="slingslop/zengarden/components/editable-component-modal"
for components edited directly in the component modal.
For inline richtext editing, use
slingslop/zengarden/components/editable-component instead.
*/-->
<div data-zen-editable-editing="true">

  <form id="editor-form"
        hx-trigger="submit"
        hx-target="closest [data-zen-editable-editing]"
        hx-swap="outerHTML"
        hx-post="${resource.path}">

    <input type="hidden" name=":redirect" value="${resource.path}.html" />

    <div id="editor-component-modal" class="editor-component-modal" aria-hidden="true">
      <div class="editor-component-modal-content" role="dialog" aria-modal="true" aria-labelledby="editor-component-modal-title">
        <div class="editor-component-modal-header">
          <h2 id="editor-component-modal-title">Edit Component</h2>
          <button type="button" class="editor-component-modal-close" aria-label="Close" onclick="closeEditorComponentModal()">×</button>
        </div>
        <div class="editor-component-modal-body">
          <sly data-sly-include="${'edit-form-fields.html'}" />
        </div>
        <div class="editor-component-modal-actions">
          <button type="button" class="btn btn-secondary"
                  hx-get="${resource.path}.html"
                  hx-target="[data-zen-editable-editing]"
                  hx-swap="outerHTML">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="saveEditorContent()">Save</button>
        </div>
      </div>
    </div>

    <div id="editor-save-error" class="editor-save-error" role="alert" aria-live="assertive" aria-hidden="true">
      <span class="editor-save-error__icon" aria-hidden="true">⚠</span>
      <span class="editor-save-error__message"></span>
      <button type="button" class="editor-save-error__close" aria-label="Dismiss" onclick="this.closest('.editor-save-error').classList.remove('is-visible');this.closest('.editor-save-error').setAttribute('aria-hidden','true')">×</button>
    </div>

  </form>

</div>
