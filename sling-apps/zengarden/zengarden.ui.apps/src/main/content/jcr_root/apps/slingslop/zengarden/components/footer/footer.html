<footer data-sly-use.auth="org.motorbrot.slingslop.zengarden.slingmodels.UserIsLoggedIn"
        data-sly-set.editPath="${resource.path}.edit-form.html"
        data-zen-editable="true"
        data-sly-attribute.hx-get="${auth.loggedIn ? editPath : false}"
        data-sly-attribute.hx-trigger="${auth.loggedIn ? 'click' : false}"
        data-sly-attribute.hx-swap="${auth.loggedIn ? 'outerHTML' : false}">
  <a href="${properties.footer1Link @ context='uri'}"
     title="${properties.footer1Title @ context='attribute'}"
     class="zen-validate-html">${properties.footer1Text}</a>
  <a href="${properties.footer2Link @ context='uri'}"
     title="${properties.footer2Title @ context='attribute'}"
     class="zen-validate-css">${properties.footer2Text}</a>
  <a href="${properties.footer3Link @ context='uri'}"
     title="${properties.footer3Title @ context='attribute'}"
     class="zen-license">${properties.footer3Text}</a>
  <a href="${properties.footer4Link @ context='uri'}"
     title="${properties.footer4Title @ context='attribute'}"
     class="zen-accessibility">${properties.footer4Text}</a>
  <a href="${properties.footer5Link @ context='uri'}"
     title="${properties.footer5Title @ context='attribute'}"
     class="zen-github">${properties.footer5Text}</a>
</footer>
