<div class="edit-fields-list">
	<div class="edit-fields-group">
		<p><strong>Footer Link 1</strong></p>
		<div class="edit-fields-grid">
			<label class="edit-field-row">
				<span class="edit-field-meta">
					<span class="edit-field-label">Link URL</span>
					<small class="edit-field-description">Full destination URL, for example https://example.org/page.</small>
				</span>
				<input type="url" name="footer1Link" value="${properties.footer1Link}" placeholder="Link URL" form="editor-form" class="edit-field-input" />
			</label>
			<label class="edit-field-row">
				<span class="edit-field-meta">
					<span class="edit-field-label">Title Attribute</span>
					<small class="edit-field-description">Tooltip text shown on hover and announced by assistive technologies.</small>
				</span>
				<input type="text" name="footer1Title" value="${properties.footer1Title}" placeholder="Link title" form="editor-form" class="edit-field-input" />
			</label>
			<label class="edit-field-row">
				<span class="edit-field-meta">
					<span class="edit-field-label">Visible Text</span>
					<small class="edit-field-description">Short text displayed in the footer.</small>
				</span>
				<input type="text" name="footer1Text" value="${properties.footer1Text}" placeholder="Visible text" form="editor-form" class="edit-field-input" />
			</label>
		</div>
	</div>
