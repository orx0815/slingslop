<div class="edit-fields-list">
  <div class="edit-fields-group">
    <p><strong>Branding</strong></p>
    <div class="edit-fields-grid">
      <label class="edit-field-row">
        <span class="edit-field-meta">
          <span class="edit-field-label">Tagline</span>
          <small class="edit-field-description">Short phrase beneath the logo in the footer.</small>
        </span>
        <input type="text" name="tagline" value="${properties.tagline}" placeholder="Forging metal culture since forever." form="editor-form" class="edit-field-input"/>
      </label>
      <label class="edit-field-row">
        <span class="edit-field-meta">
          <span class="edit-field-label">Copyright Year</span>
          <small class="edit-field-description">Year shown in the copyright strip. Defaults to 2025.</small>
        </span>
        <input type="text" name="copyrightYear" value="${properties.copyrightYear}" placeholder="2025" form="editor-form" class="edit-field-input"/>
      </label>
    </div>
  </div>

  <div class="edit-fields-group">
    <p><strong>Navigation Links</strong></p>
    <div class="edit-fields-grid">
      <!--/* Link 1 */-->
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Link 1 Text</span></span>
        <input type="text"  name="navLink1Text"  value="${properties.navLink1Text}"  placeholder="Home"  form="editor-form" class="edit-field-input"/>
      </label>
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Link 1 URL</span></span>
        <input type="text"  name="navLink1Url"   value="${properties.navLink1Url}"   placeholder="/content/metal-mania/home.html"  form="editor-form" class="edit-field-input"/>
      </label>
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Link 1 Title (tooltip)</span></span>
        <input type="text"  name="navLink1Title" value="${properties.navLink1Title}" placeholder=""      form="editor-form" class="edit-field-input"/>
      </label>
      <!--/* Link 2 */-->
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Link 2 Text</span></span>
        <input type="text"  name="navLink2Text"  value="${properties.navLink2Text}"  placeholder="Bands" form="editor-form" class="edit-field-input"/>
      </label>
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Link 2 URL</span></span>
        <input type="text"  name="navLink2Url"   value="${properties.navLink2Url}"   placeholder="/content/metal-mania/bands.html" form="editor-form" class="edit-field-input"/>
      </label>
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Link 2 Title (tooltip)</span></span>
        <input type="text"  name="navLink2Title" value="${properties.navLink2Title}" placeholder=""      form="editor-form" class="edit-field-input"/>
      </label>
      <!--/* Link 3 */-->
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Link 3 Text</span></span>
        <input type="text"  name="navLink3Text"  value="${properties.navLink3Text}"  placeholder="Tours" form="editor-form" class="edit-field-input"/>
      </label>
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Link 3 URL</span></span>
        <input type="text"  name="navLink3Url"   value="${properties.navLink3Url}"   placeholder="/content/metal-mania/tours.html" form="editor-form" class="edit-field-input"/>
      </label>
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Link 3 Title (tooltip)</span></span>
        <input type="text"  name="navLink3Title" value="${properties.navLink3Title}" placeholder=""      form="editor-form" class="edit-field-input"/>
      </label>
      <!--/* Link 4 */-->
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Link 4 Text</span></span>
        <input type="text"  name="navLink4Text"  value="${properties.navLink4Text}"  placeholder="About" form="editor-form" class="edit-field-input"/>
      </label>
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Link 4 URL</span></span>
        <input type="text"  name="navLink4Url"   value="${properties.navLink4Url}"   placeholder="/content/metal-mania/about.html" form="editor-form" class="edit-field-input"/>
      </label>
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Link 4 Title (tooltip)</span></span>
        <input type="text"  name="navLink4Title" value="${properties.navLink4Title}" placeholder=""      form="editor-form" class="edit-field-input"/>
      </label>
    </div>
  </div>

  <div class="edit-fields-group">
    <p><strong>Social Links</strong></p>
    <div class="edit-fields-grid">
      <!--/* Social 1 */-->
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Social 1 URL</span></span>
        <input type="url" name="social1Url"   value="${properties.social1Url}"   placeholder="https://instagram.com/…" form="editor-form" class="edit-field-input"/>
      </label>
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Social 1 Label</span></span>
        <input type="text" name="social1Label" value="${properties.social1Label}" placeholder="Instagram"               form="editor-form" class="edit-field-input"/>
      </label>
      <label class="edit-field-row">
        <span class="edit-field-meta">
          <span class="edit-field-label">Social 1 Icon (SVG)</span>
          <small class="edit-field-description">Paste an inline SVG icon (max 24×24 px).</small>
        </span>
        <input type="text" name="social1Icon"  value="${properties.social1Icon}"  placeholder="&lt;svg…&gt;" form="editor-form" class="edit-field-input"/>
      </label>
      <!--/* Social 2 */-->
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Social 2 URL</span></span>
        <input type="url" name="social2Url"   value="${properties.social2Url}"   placeholder="https://youtube.com/…"  form="editor-form" class="edit-field-input"/>
      </label>
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Social 2 Label</span></span>
        <input type="text" name="social2Label" value="${properties.social2Label}" placeholder="YouTube"                form="editor-form" class="edit-field-input"/>
      </label>
      <label class="edit-field-row">
        <span class="edit-field-meta">
          <span class="edit-field-label">Social 2 Icon (SVG)</span>
          <small class="edit-field-description">Paste an inline SVG icon (max 24×24 px).</small>
        </span>
        <input type="text" name="social2Icon"  value="${properties.social2Icon}"  placeholder="&lt;svg…&gt;" form="editor-form" class="edit-field-input"/>
      </label>
      <!--/* Social 3 */-->
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Social 3 URL</span></span>
        <input type="url" name="social3Url"   value="${properties.social3Url}"   placeholder="https://spotify.com/…"  form="editor-form" class="edit-field-input"/>
      </label>
      <label class="edit-field-row">
        <span class="edit-field-meta"><span class="edit-field-label">Social 3 Label</span></span>
        <input type="text" name="social3Label" value="${properties.social3Label}" placeholder="Spotify"                form="editor-form" class="edit-field-input"/>
      </label>
      <label class="edit-field-row">
        <span class="edit-field-meta">
          <span class="edit-field-label">Social 3 Icon (SVG)</span>
          <small class="edit-field-description">Paste an inline SVG icon (max 24×24 px).</small>
        </span>
        <input type="text" name="social3Icon"  value="${properties.social3Icon}"  placeholder="&lt;svg…&gt;" form="editor-form" class="edit-field-input"/>
      </label>
    </div>
  </div>
</div>
