<div class="edit-fields-list">
	<div class="edit-fields-group">
		<p><strong>Footer Text</strong></p>
		<div class="edit-fields-grid">
			<label class="edit-field-row">
				<span class="edit-field-meta">
					<span class="edit-field-label">Copyright Text</span>
					<small class="edit-field-description">Main footer text, typically copyright notice.</small>
				</span>
				<input type="text" name="copyrightText" value="${properties.copyrightText}"
					   placeholder="Copyright text" form="editor-form" class="edit-field-input" />
			</label>
		</div>
	</div>

	<div class="edit-fields-group">

				</span>
				<input type="url" name="link1Url" value="${properties.link1Url}"
					   placeholder="Link URL" form="editor-form" class="edit-field-input" />
			</label>
			<label class="edit-field-row">
				<span class="edit-field-meta">
					<span class="edit-field-label">Link Text</span>
					<small class="edit-field-description">Visible link text.</small>
				</span>
				<input type="text" name="link1Text" value="${properties.link1Text}"
					   placeholder="Link text" form="editor-form" class="edit-field-input" />
			</label>
		</div>
	</div>
