<!--/* Thin-wrapper delegation script.
       Sling renders the page node (sling:Folder) via this script, which immediately
       delegates rendering to the jcr:content child node.  That child carries the real
       sling:resourceType (homepage / basepage / contentpage …) so all subsequent scripts
       run in the context of jcr:content — identical to how AEM handles cq:Page nodes.
       In AEM this file can simply be deleted; cq:Page does the delegation automatically. */-->
<sly data-sly-resource="${'jcr:content'}"/>
