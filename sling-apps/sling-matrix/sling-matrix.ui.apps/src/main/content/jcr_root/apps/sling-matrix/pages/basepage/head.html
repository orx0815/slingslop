<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>${properties.jcr:title}</title>

<!--/*  /sling-matrix/home.html?minLibs=no for unminified sources */-->
<sly data-sly-test.noMinLibs="${request.parameterMap['minLibs'][0] == 'no'}">

  <!-- Public bundle (unminified) -->
  <script src="/apps/sling-matrix/js/public/public-bundle.js"></script>
  <link rel="stylesheet" href="/apps/sling-matrix/css/public/public.css" />

  <!-- Editor bundle (unminified) — only for logged-in users -->
  <sly data-sly-use.auth="org.motorbrot.slingmatrix.slingmodels.UserIsLoggedIn"
       data-sly-test="${auth.loggedIn}">
    <!-- htmx for hypermedia interactions -->
    <script src="/apps/sling-matrix/js/htmx.js"></script>
    <script src="/apps/sling-matrix/js/editor/editor-bundle.js"></script>
    <link rel="stylesheet" href="/apps/sling-matrix/css/editor/editor.css" />
  </sly>

</sly>
<sly data-sly-test="${!noMinLibs}">

  <!-- Public bundle (minified) -->
  <script src="/apps/sling-matrix/js/public/public-bundle.min.js"></script>
  <link rel="stylesheet" href="/apps/sling-matrix/css/public/public.min.css" />

  <!-- Editor bundle (minified, htmx inlined) — only for logged-in users -->
  <sly data-sly-use.auth="org.motorbrot.slingmatrix.slingmodels.UserIsLoggedIn"
       data-sly-test="${auth.loggedIn}">
    <script src="/apps/sling-matrix/js/editor/editor-bundle.min.js"></script>
    <link rel="stylesheet" href="/apps/sling-matrix/css/editor/editor.min.css" />
  </sly>

</sly>
