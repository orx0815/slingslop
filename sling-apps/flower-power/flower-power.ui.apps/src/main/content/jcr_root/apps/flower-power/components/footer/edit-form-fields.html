<div class="edit-fields-list">
  <h3>Column 1</h3>
  <div class="edit-field-row">
    <div class="edit-field-meta">
      <label class="edit-field-label" for="col1Title">Column 1 Title</label>
    </div>
    <input type="text"
           id="col1Title"
           name="col1Title"
           class="edit-field-input"
           value="${properties.col1Title}"
           placeholder="About Flower Power" />
  </div>
  <div class="edit-field-row">
    <div class="edit-field-meta">
      <label class="edit-field-label" for="col1Content">Column 1 Content (HTML)</label>
    </div>
    <textarea id="col1Content"
              name="col1Content"
              class="edit-field-input"
              rows="4">${properties.col1Content}</textarea>
  </div>

  <h3>Column 2</h3>
  <div class="edit-field-row">
    <div class="edit-field-meta">
      <label class="edit-field-label" for="col2Title">Column 2 Title</label>
    </div>
    <input type="text"
           id="col2Title"
           name="col2Title"
           class="edit-field-input"
           value="${properties.col2Title}"
           placeholder="Quick Links" />
  </div>
  <div class="edit-field-row">
    <div class="edit-field-meta">
      <label class="edit-field-label" for="col2Content">Column 2 Content (HTML)</label>
    </div>
    <textarea id="col2Content"
              name="col2Content"
              class="edit-field-input"
              rows="4">${properties.col2Content}</textarea>
  </div>

  <h3>Column 3</h3>
  <div class="edit-field-row">
    <div class="edit-field-meta">
      <label class="edit-field-label" for="col3Title">Column 3 Title</label>
    </div>
    <input type="text"
           id="col3Title"
           name="col3Title"
           class="edit-field-input"
           value="${properties.col3Title}"
           placeholder="Connect" />
  </div>
  <div class="edit-field-row">
    <div class="edit-field-meta">
      <label class="edit-field-label" for="col3Content">Column 3 Content (HTML)</label>
    </div>
    <textarea id="col3Content"
              name="col3Content"
              class="edit-field-input"
              rows="4">${properties.col3Content}</textarea>
  </div>

  <h3>Copyright</h3>
  <div class="edit-field-row">
    <div class="edit-field-meta">
      <label class="edit-field-label" for="copyright">Copyright Text (HTML)</label>
    </div>
    <textarea id="copyright"
              name="copyright"
              class="edit-field-input"
              rows="2">${properties.copyright}</textarea>
  </div>
</div>
