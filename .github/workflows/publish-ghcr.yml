name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish"
        required: true
        default: "latest"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image with Maven plugin
        run: mvn -U -pl launcher -am clean install -DskipITs -Ddocker.skip=false -Ddocker.skip.push=false -Ddocker.image.tag=${{ github.event.inputs.image_tag }} -Ddocker.image.extra.tag=sha-${{ github.sha }}
